<!DOCTYPE html>
<html>
<head>
    <title>Story Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
            background-color: #f4f4f4;
        }
        h2 {
            color: #333;
        }
        input {
            padding: 12px;
            width: 300px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            margin-left: 10px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            background-color: #4CAF50;
            color: white;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin: 30px auto;
            font-size: 18px;
            font-weight: bold;
            color: #444;
            max-width: 600px;
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            min-height: 50px;
            text-align: left;
            white-space: pre-wrap; /* preserve line breaks */
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg);}
            100% { transform: rotate(360deg);}
        }
    </style>
</head>
<body>

<h2>Enter the topic you want to generate a story for</h2>

<input type="text" id="topic" placeholder="Enter topic here..." />
<button onclick="generateStory()">Submit</button>

<div id="result"></div>

<script>
async function generateStory() {
    const topic = document.getElementById("topic").value.trim();
    const resultDiv = document.getElementById("result");

    if (topic === "") {
        resultDiv.innerText = "Please enter a topic first.";
        return;
    }

    // Show loading spinner
    resultDiv.innerHTML = "Generating story... <span class='spinner'></span>";

    try {
        const response = await fetch("https://bssavanti.app.n8n.cloud/webhook-test/generateStory", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ topic })
        });

        const data = await response.json();

        // Display story, preserve line breaks
        resultDiv.innerText = data.story;

    } catch (error) {
        resultDiv.innerText = "Error connecting to server.";
        console.error(error);
    }
}
</script>

</body>
</html>
